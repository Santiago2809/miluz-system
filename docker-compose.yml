services:
    frontend:
        container_name: miluz-frontend
        build: ./frontend
        ports:
            - "3000:80"
        depends_on:
            - backend
    backend:
        container_name: miluz-backend
        build: ./backend
        ports:
            - "8000:8000"
        depends_on:
            - db
    db:
        container_name: miluz-db
        image: postgres:16.14-alpine3.23
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - "${POSTGRES_PORT:5432}:5432"
        volumes:
            - db_data:/var/lib/postgresql/data

volumes:
    db_data:
